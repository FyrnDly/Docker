services:
  # Redis Store
  redis:
    image: "redis:alpine"
    restart: always
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    environment:
      - TZ=Asia/Jakarta
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - fyrn
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
      