services:
  # IoT Network UI
  node-red:
    image: nodered/node-red:latest
    container_name: nodered
    ports:
      - "${NODERED_PORT}:1880"
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - ./volumes/iot/nodered:/data
    restart: always
    networks:
      - fyrn

  # MQTT Web UI
  mqttx:
    image: emqx/mqttx-web:latest
    container_name: mqttx
    ports:
      - "${MQTTX_WEB_PORT}:80"
    networks:
      - fyrn

  # MQTT Protocol
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt
    ports:
      - "${MQTT_HOST_PORT}:1883"
      - "${MQTT_WSS_PORT}:9001"
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - ./volumes/iot/mosquitto/config:/mosquitto/config
      - ./volumes/iot/mosquitto/data:/mosquitto/data
      - ./volumes/iot/mosquitto/log:/mosquitto/log
    networks:
      - fyrn
